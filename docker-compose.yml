version: '3.9'

services:

  backend:
    build:
      context: ./backend
    container_name: nwc-backend
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - postgres
    ports:
      - "8000:8000"

  celery:
    build:
      context: ./backend
    container_name: nwc-celery
    # Эта команда теперь будет работать, т.к. WORKDIR в образе установлен на /code/app
    command: celery -A tasks worker --pool=prefork --loglevel=info
    env_file:
      - ./backend/.env
    depends_on:
      - backend
      - redis
      - postgres
    volumes:
      # <--- ИЗМЕНЕНИЕ ПУТИ
      - ./config_refined.yaml:/code/config_refined.yaml

  frontend:
    build:
      context: ./frontend
    container_name: nwc-frontend
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: nwc-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    container_name: nwc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: nwc
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
    name: supabase-data
